<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project HarborCrest — Poster (ISO A1)</title>
<meta name="description" content="VAST Challenge 2026 MC1 — Investigating the Information Leak at TenantThread. ISO A1 poster (594 × 841 mm, 300 dpi).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0d1b2a; --blue:#2563eb; --line:#dbe3ec; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"DM Sans","Segoe UI",system-ui,Arial,sans-serif;
    background:#9aa6b4;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  /* Toolbar */
  .toolbar{
    position:sticky; top:0; z-index:10;
    display:flex; align-items:center; gap:.9rem; flex-wrap:wrap;
    padding:.7rem 1.1rem;
    background:linear-gradient(110deg,#0b1622 0%,#13263c 55%,#1c3a5e 100%);
    color:#eaf1f8; border-bottom:3px solid var(--blue);
    box-shadow:0 2px 14px rgba(13,27,42,.25);
  }
  .toolbar .title{ font-weight:800; letter-spacing:.01em; }
  .toolbar .spec{ font-size:.8rem; color:#a9c8f4; font-weight:600; }
  .toolbar .grow{ flex:1; }
  .btn{
    display:inline-flex; align-items:center; gap:.4rem;
    padding:.5rem 1rem; border-radius:9px; font-weight:700; font-size:.86rem;
    text-decoration:none; transition:transform .15s ease;
  }
  .btn.primary{ background:#2f6fed; color:#fff; }
  .btn.ghost{ background:rgba(255,255,255,.1); color:#eaf1f8; border:1px solid rgba(255,255,255,.28); }
  .btn:hover{ transform:translateY(-1px); }
  /* Stage */
  .stage{ padding:2.2rem clamp(.6rem,3vw,3rem); display:flex; justify-content:center; }
  .sheet{
    background:#fff; border-radius:6px; overflow:hidden;
    box-shadow:0 30px 70px -30px rgba(13,27,42,.7);
    width:min(100%, 1200px);
  }
  .sheet img{ display:block; width:100%; height:auto; }
  footer{ text-align:center; color:#41566c; font-size:.82rem; padding:0 1rem 2.2rem; }
</style>
</head>
<body>
  <div class="toolbar">
    <span class="title">Project HarborCrest</span>
    <span class="spec">ISO A1 · 594 × 841 mm · 300 dpi · 7016 × 9933 px</span>
    <span class="grow"></span>
    <a class="btn primary" href="poster_final.jpg" download>⬇️ Download full-resolution JPEG</a>
    <a class="btn ghost" href="poster_final.jpg" target="_blank">🔍 Open at 100%</a>
  </div>

  <div class="stage">
    <div class="sheet">
      <a href="poster_final.jpg" target="_blank" title="Open full-resolution poster">
        <img src="poster_final_web.jpg"
             alt="Project HarborCrest poster — VAST Challenge 2026 MC1"
             loading="eager">
      </a>
    </div>
  </div>

  <footer>
    VAST Challenge 2026 · Mini-Challenge 1 &nbsp;·&nbsp; BUI Tien Thanh · HU Yue · WU Jiayan
    &nbsp;·&nbsp; Singapore Management University · ISSS608
  </footer>
</body>
</html>
